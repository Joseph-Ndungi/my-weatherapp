<div class="search-wrap">
  <div class="search-input-row">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input
      type="text"
      [(ngModel)]="query"
      (ngModelChange)="onInput()"
      placeholder="Search city or location..."
      autocomplete="off"
      spellcheck="false"
    />
    <button *ngIf="query" class="clear-btn" (click)="clear()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <ul class="results" *ngIf="results.length">
    <li *ngFor="let r of results" (click)="select(r)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="pin-icon">
        <path d="M12 21c-4-4-7-7.5-7-11a7 7 0 0 1 14 0c0 3.5-3 7-7 11z"/>
        <circle cx="12" cy="10" r="2.5"/>
      </svg>
      <span class="city">{{ r.display_name.split(',')[0] }}</span>
      <span class="region">{{ r.display_name.split(',').slice(1,3).join(',') }}</span>
    </li>
  </ul>
</div>
